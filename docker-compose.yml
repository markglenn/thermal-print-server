services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace
      - mix-deps:/workspace/deps
      - mix-build:/workspace/_build
    ports:
      - "4000:4000"
    environment:
      - MIX_ENV=dev
      - CUPS_URI=ipp://cups:631
    depends_on:
      cups:
        condition: service_healthy
    command: bash -c "mix deps.get && mix compile && mix assets.setup && mix assets.build && mix phx.server"
    stdin_open: true
    tty: true

  cups:
    build:
      context: docker/cups
    ports:
      - "631:631"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:631/"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - cups-data:/etc/cups

volumes:
  mix-deps:
  mix-build:
  cups-data:
