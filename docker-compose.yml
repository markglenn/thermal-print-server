services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace
      - mix-deps:/workspace/deps
      - mix-build:/workspace/_build
    ports:
      - "4000:4000"
    environment:
      - MIX_ENV=dev
      - CUPS_URI=ipp://cups:631
      - PRINT_QUEUE_URL=http://goaws:4100/000000000000/thermal-print-queue
      - PRINT_BUCKET=thermal-print-jobs
      - RESPONSE_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:thermal-events
      - SITE_ID=dev-local
      - HEARTBEAT_INTERVAL=30
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=testtest1
      - AWS_REGION=us-east-1
      - AWS_SQS_ENDPOINT=http://goaws:4100
      - AWS_SNS_ENDPOINT=http://goaws:4100
      - AWS_S3_ENDPOINT=http://minio:9000
    depends_on:
      cups:
        condition: service_healthy
      goaws:
        condition: service_started
      minio:
        condition: service_healthy
    command: bash -c "mix deps.get && mix compile && mix assets.setup && mix assets.build && mix phx.server"
    stdin_open: true
    tty: true

  cups:
    build:
      context: docker/cups
    ports:
      - "631:631"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:631/"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - cups-data:/etc/cups

  goaws:
    image: pafortin/goaws
    ports:
      - "4100:4100"
    volumes:
      - ./docker/goaws/goaws.yaml:/conf/goaws.yaml
    logging:
      driver: "none"

  minio:
    image: minio/minio
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      - MINIO_ROOT_USER=test
      - MINIO_ROOT_PASSWORD=testtest1
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 test testtest1 --api s3v4;
      mc mb --ignore-existing local/thermal-print-jobs;
      echo 'MinIO bucket ready';
      "

volumes:
  mix-deps:
  mix-build:
  cups-data:
  minio-data:
